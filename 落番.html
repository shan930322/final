<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>落番 Luò Fān ─ 金門下南洋生存記</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060202;--bg2:#0e0505;--bg3:#180808;
  --bdr:#3a1208;--bdr2:#6a2010;
  --tx:#c4b090;--td:#4a2a16;--tb:#e4d0b0;
  --red:#8c1a1a;--rl:#c03030;--rll:#e04040;
  --gold:#8a6020;--gl:#b08030;--gll:#d0a840;
  --navy:#04080e;--sea:#060e18;
  --font:"Noto Serif TC","STSong","SimSun",serif;
  --tile: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='80' height='80' fill='%230a0302'/><rect x='2' y='2' width='76' height='76' fill='none' stroke='%234a1208' stroke-width='1.2'/><rect x='6' y='6' width='68' height='68' fill='none' stroke='%23380e06' stroke-width='0.6'/><polygon points='40,8 72,40 40,72 8,40' fill='none' stroke='%235a1a08' stroke-width='1'/><circle cx='40' cy='40' r='14' fill='%231e0606'/><circle cx='40' cy='40' r='9' fill='none' stroke='%238a4818' stroke-width='0.8'/><circle cx='40' cy='40' r='4' fill='%238a5018'/><ellipse cx='40' cy='24' rx='3.5' ry='6.5' fill='%236a1808'/><ellipse cx='40' cy='56' rx='3.5' ry='6.5' fill='%236a1808'/><ellipse cx='24' cy='40' rx='6.5' ry='3.5' fill='%236a1808'/><ellipse cx='56' cy='40' rx='6.5' ry='3.5' fill='%236a1808'/><ellipse cx='29.4' cy='29.4' rx='3' ry='5.5' fill='%235a1408' transform='rotate(45 29.4 29.4)'/><ellipse cx='50.6' cy='29.4' rx='3' ry='5.5' fill='%235a1408' transform='rotate(-45 50.6 29.4)'/><ellipse cx='29.4' cy='50.6' rx='3' ry='5.5' fill='%235a1408' transform='rotate(-45 29.4 50.6)'/><ellipse cx='50.6' cy='50.6' rx='3' ry='5.5' fill='%235a1408' transform='rotate(45 50.6 50.6)'/><circle cx='12' cy='12' r='3' fill='%234a1208'/><circle cx='68' cy='12' r='3' fill='%234a1208'/><circle cx='12' cy='68' r='3' fill='%234a1208'/><circle cx='68' cy='68' r='3' fill='%234a1208'/></svg>");
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);line-height:1.95;overflow-x:hidden;}
/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}
/* ── TILE BORDERS ── */
.tile-band{
  height:80px;
  background-image:var(--tile);
  background-size:80px 80px;
  background-repeat:repeat-x;
  opacity:.55;
}
.tile-band-sm{height:48px;background-image:var(--tile);background-size:48px 48px;background-repeat:repeat-x;opacity:.45;}
/* ── VIGNETTE ── */
.vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,.72) 100%);}
/* ── LANDING ── */
#screen-intro{background:var(--bg);}
.intro-inner{max-width:760px;margin:0 auto;padding:0 1.2rem 3rem;}
.game-title-wrap{text-align:center;padding:2rem 1rem 1.5rem;}
.game-eyebrow{font-size:.7rem;letter-spacing:.35em;color:var(--td);text-transform:uppercase;margin-bottom:.5rem;}
.game-title-zh{font-size:clamp(2.4rem,7vw,4rem);font-weight:700;color:var(--tb);letter-spacing:.18em;line-height:1.1;}
.game-title-py{font-size:.95rem;letter-spacing:.3em;color:var(--gold);margin:.3rem 0 .6rem;font-style:italic;}
.game-tagline{font-size:.85rem;color:var(--rl);letter-spacing:.15em;}
/* ── MAP ── */
.map-wrap{
  border:1px solid var(--bdr);
  background:var(--navy);
  margin:1.2rem 0;
  position:relative;
  overflow:hidden;
}
.map-wrap svg{display:block;width:100%;height:auto;}
/* ── PROVERB BOX ── */
.proverb-wrap{
  border:1px solid var(--bdr);
  background:var(--bg2);
  padding:1.2rem 1.5rem;
  margin:1.2rem 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.proverb-wrap::before,.proverb-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:48px;
  background-image:var(--tile);background-size:48px 48px;opacity:.35;
}
.proverb-wrap::before{left:0;}
.proverb-wrap::after{right:0;}
.proverb-main{font-size:1.15rem;letter-spacing:.22em;color:var(--tb);margin-bottom:.9rem;}
.proverb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;padding:0 60px;}
.pg-item{text-align:center;}
.pg-num{font-size:1.1rem;font-weight:700;}
.pg-label{font-size:.72rem;color:var(--td);margin-top:.15rem;}
.pg-death{color:var(--rl);}
.pg-stay{color:var(--gl);}
.pg-ret{color:#60a858;}
/* ── HISTORY TEXT ── */
.history-text{font-size:.88rem;line-height:2.05;color:var(--tx);margin:1.2rem 0;}
.history-text p{margin-bottom:.85rem;}
.history-text em{color:var(--gl);font-style:normal;}
/* ── DIVIDER ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--bdr2),transparent);margin:1.2rem 0;opacity:.6;}
/* ── BUTTONS ── */
.btn-start{
  display:block;width:100%;
  background:transparent;border:1px solid var(--gl);
  color:var(--gl);font-family:var(--font);font-size:.9rem;
  letter-spacing:.25em;padding:1rem 2rem;
  cursor:pointer;transition:all .35s;margin-top:1rem;
}
.btn-start:hover{background:var(--red);border-color:var(--rl);color:var(--tb);box-shadow:0 0 28px rgba(140,26,26,.5);}
.btn-choice{
  display:flex;gap:.85rem;align-items:flex-start;
  width:100%;background:transparent;
  border:1px solid var(--bdr);color:var(--tx);
  font-family:var(--font);font-size:.87rem;line-height:1.85;
  padding:1rem 1.2rem;text-align:left;cursor:pointer;
  transition:all .28s;margin-bottom:.65rem;
}
.btn-choice:hover{border-color:var(--rl);background:rgba(140,26,26,.1);color:var(--tb);}
.btn-choice:hover .choice-key{color:var(--rl);}
.choice-key{color:var(--gl);font-weight:700;font-size:.8rem;flex-shrink:0;margin-top:.15rem;transition:color .25s;}
.choice-sub{color:var(--td);font-size:.8rem;display:block;margin-top:.2rem;}
.btn-restart{
  display:block;width:100%;background:transparent;
  border:1px solid var(--td);color:var(--td);
  font-family:var(--font);font-size:.82rem;
  letter-spacing:.2em;padding:.9rem;
  cursor:pointer;transition:all .3s;text-align:center;margin-top:.5rem;
}
.btn-restart:hover{border-color:var(--gl);color:var(--gl);}
/* ── GAME SCREEN ── */
#screen-game{background:var(--bg);padding:0 0 3rem;}
.game-inner{max-width:720px;margin:0 auto;padding:1.5rem 1.2rem;}
.step-counter{font-size:.68rem;letter-spacing:.2em;color:var(--td);text-align:right;margin-bottom:1.2rem;}
.scene-card{
  border:1px solid var(--bdr);background:var(--bg2);
  padding:1.8rem 2rem;margin-bottom:1.2rem;
  position:relative;overflow:hidden;
}
.scene-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:10px;background:repeating-linear-gradient(180deg,#0a0303 0,#0a0303 18px,#160808 18px,#160808 20px);border-right:1px solid rgba(80,14,8,.5);}
.scene-card::after{content:'';position:absolute;right:0;top:0;bottom:0;width:10px;background:repeating-linear-gradient(180deg,#0a0303 0,#0a0303 18px,#160808 18px,#160808 20px);border-left:1px solid rgba(80,14,8,.5);}
.scene-inner{padding:0 14px;}
.scene-tag{font-size:.65rem;letter-spacing:.25em;color:var(--td);text-transform:uppercase;margin-bottom:.45rem;}
.scene-title{font-size:1.1rem;color:var(--tb);letter-spacing:.1em;margin-bottom:.9rem;padding-bottom:.55rem;border-bottom:1px solid var(--bdr);}
.scene-text{font-size:.9rem;line-height:2.05;color:var(--tx);}
.scene-text p{margin-bottom:.7rem;}
.scene-text em{color:var(--gl);font-style:normal;}
.scene-text strong{color:var(--rl);}
/* ── ENDING SCREEN ── */
#screen-ending{background:var(--bg);padding:0 0 3rem;}
.ending-inner{max-width:720px;margin:0 auto;padding:1.5rem 1.2rem;}
.ending-card{border:1px solid var(--bdr);padding:2rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.ending-card.death{border-color:#7a1a1a;background:#120404;}
.ending-card.stay{border-color:#6b5415;background:#0e0902;}
.ending-card.ret{border-color:#3a6b30;background:#060a04;}
.ending-tag{font-size:.68rem;letter-spacing:.35em;margin-bottom:.4rem;}
.ending-card.death .ending-tag{color:var(--rl);}
.ending-card.stay .ending-tag{color:var(--gl);}
.ending-card.ret .ending-tag{color:#60a858;}
.ending-title{font-size:1.22rem;letter-spacing:.1em;margin-bottom:1.1rem;}
.ending-card.death .ending-title{color:#d46060;}
.ending-card.stay .ending-title{color:#c09020;}
.ending-card.ret .ending-title{color:#60a858;}
.ending-text{font-size:.88rem;line-height:2.05;color:var(--tx);}
.ending-text p{margin-bottom:.7rem;}
.ending-proverb{font-size:1rem;letter-spacing:.22em;text-align:center;padding:.85rem;border-top:1px solid var(--bdr);margin-top:.8rem;}
.ending-card.death .ending-proverb{color:var(--rl);}
.ending-card.stay .ending-proverb{color:var(--gl);}
.ending-card.ret .ending-proverb{color:#60a858;}
.history-box{border:1px solid var(--bdr);background:var(--bg3);padding:1.2rem 1.5rem;margin-bottom:1rem;font-size:.8rem;line-height:1.95;color:var(--td);}
.history-box h4{color:var(--gl);font-size:.75rem;letter-spacing:.15em;margin-bottom:.55rem;}
/* ── AUDIO BTN ── */
#audio-ctrl{position:fixed;bottom:1.2rem;right:1.2rem;z-index:999;background:var(--bg2);border:1px solid var(--bdr);color:var(--td);font-family:var(--font);font-size:.72rem;letter-spacing:.1em;padding:.4rem .7rem;cursor:pointer;transition:all .3s;}
#audio-ctrl:hover{color:var(--gl);border-color:var(--gl);}
/* ── FADE ── */
.fade-in{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
/* ── RESPONSIVE ── */
@media(max-width:600px){
  .game-title-zh{font-size:2.2rem;}
  .scene-card{padding:1.4rem 1.2rem;}
  .scene-inner{padding:0 8px;}
  .proverb-grid{padding:0 50px;}
}
</style>
</head>
<body>

<button id="audio-ctrl" onclick="Audio.toggle()">♪ 音效</button>

<!-- ══════════ INTRO SCREEN ══════════ -->
<div id="screen-intro" class="screen active">
  <div class="tile-band"></div>
  <div class="intro-inner">

    <div class="game-title-wrap">
      <div class="game-eyebrow">19世紀中至20世紀初 · 金門 · 南洋</div>
      <div class="game-title-zh">落　番</div>
      <div class="game-title-py">Luò Fān</div>
      <div class="game-tagline">一段下南洋的生死命運</div>
    </div>

    <!-- MAP SVG -->
    <div class="map-wrap">
      <svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="金門至南洋航線圖" style="width:100%;max-width:600px;display:block;margin:0 auto;">
        <defs>
          <radialGradient id="gKinmen" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b08030" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#b08030" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="gNanyang" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#8c1a1a" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#8c1a1a" stop-opacity="0"/>
          </radialGradient>
          <filter id="fglow">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feComposite in="SourceGraphic" in2="b" operator="over"/>
          </filter>
          <marker id="wake" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <path d="M0,0 L6,2 L0,4" fill="none" stroke="#b08030" stroke-width="0.8" opacity="0.7"/>
          </marker>
        </defs>

        <!-- Background -->
        <rect width="600" height="200" fill="#04080e"/>

        <!-- Subtle sea texture lines -->
        <line x1="0" y1="50" x2="600" y2="50" stroke="#060e18" stroke-width="8" opacity="0.6"/>
        <line x1="0" y1="100" x2="600" y2="100" stroke="#060e18" stroke-width="6" opacity="0.5"/>
        <line x1="0" y1="150" x2="600" y2="150" stroke="#060e18" stroke-width="8" opacity="0.6"/>
        <!-- Fine wave lines -->
        <path d="M0,40 Q75,36 150,40 Q225,44 300,40 Q375,36 450,40 Q525,44 600,40" fill="none" stroke="#0a1828" stroke-width="0.8" opacity="0.7"/>
        <path d="M0,60 Q75,56 150,60 Q225,64 300,60 Q375,56 450,60 Q525,64 600,60" fill="none" stroke="#0a1828" stroke-width="0.8" opacity="0.7"/>
        <path d="M0,80 Q75,76 150,80 Q225,84 300,80 Q375,76 450,80 Q525,84 600,80" fill="none" stroke="#0a1828" stroke-width="0.8" opacity="0.7"/>
        <path d="M0,120 Q75,116 150,120 Q225,124 300,120 Q375,116 450,120 Q525,124 600,120" fill="none" stroke="#0a1828" stroke-width="0.8" opacity="0.7"/>
        <path d="M0,140 Q75,136 150,140 Q225,144 300,140 Q375,136 450,140 Q525,144 600,140" fill="none" stroke="#0a1828" stroke-width="0.8" opacity="0.7"/>
        <path d="M0,160 Q75,156 150,160 Q225,164 300,160 Q375,156 450,160 Q525,164 600,160" fill="none" stroke="#0a1828" stroke-width="0.8" opacity="0.7"/>

        <!-- Glow halos -->
        <circle cx="480" cy="100" r="60" fill="url(#gKinmen)"/>
        <circle cx="120" cy="100" r="60" fill="url(#gNanyang)"/>

        <!-- === ROUTE LINE === -->
        <!-- Dashed gold route, slight arc downward (open sea feel) -->
        <path d="M 460,100 C 420,118 360,122 300,118 C 240,114 180,112 140,100"
          fill="none" stroke="#6a3a08" stroke-width="1.5" opacity="0.5"/>
        <path d="M 460,100 C 420,118 360,122 300,118 C 240,114 180,112 140,100"
          fill="none" stroke="#b08030" stroke-width="1.5" stroke-dasharray="12,7" opacity="0.85" filter="url(#fglow)"/>

        <!-- === SHIP ICON (middle of route ~x=300,y=116) === -->
        <g transform="translate(300,113) rotate(-5)">
          <!-- Hull -->
          <path d="M-22,6 Q-18,12 0,13 Q18,12 22,6 L18,4 Q0,8 -18,4 Z"
            fill="#b08030" opacity="0.9"/>
          <!-- Body -->
          <rect x="-15" y="-2" width="30" height="8" rx="2" fill="#8a6020" opacity="0.9"/>
          <!-- Mast -->
          <line x1="0" y1="-2" x2="0" y2="-20" stroke="#c8a040" stroke-width="1.2" opacity="0.9"/>
          <!-- Sail (main) -->
          <path d="M 0,-19 L 14,-8 L 0,-3 Z" fill="#c4b090" opacity="0.75"/>
          <!-- Sail (fore) -->
          <path d="M 0,-14 L -10,-6 L 0,-3 Z" fill="#c4b090" opacity="0.55"/>
          <!-- Boom -->
          <line x1="-15" y1="2" x2="15" y2="2" stroke="#8a6020" stroke-width="0.8" opacity="0.7"/>
          <!-- Wake lines behind ship -->
          <path d="M 22,8 Q 32,6 42,9" fill="none" stroke="#b08030" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
          <path d="M 22,10 Q 32,10 42,12" fill="none" stroke="#b08030" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
        </g>

        <!-- === 南洋 (destination, left) === -->
        <!-- Pulsing ring -->
        <circle cx="120" cy="100" r="18" fill="none" stroke="#8c1a1a" stroke-width="0.8" opacity="0.4"/>
        <circle cx="120" cy="100" r="12" fill="none" stroke="#c03030" stroke-width="1" opacity="0.6"/>
        <!-- Dot -->
        <circle cx="120" cy="100" r="5" fill="#c03030" stroke="#e04040" stroke-width="1" opacity="0.95"/>
        <!-- Label -->
        <text x="120" y="78" fill="#d0a840" font-size="15" text-anchor="middle" font-family="Noto Serif TC,STSong,SimSun,serif" font-weight="bold" letter-spacing="2" opacity="0.95">南洋</text>
        <text x="120" y="132" fill="#6a5030" font-size="8" text-anchor="middle" font-family="Georgia,serif" letter-spacing="1" opacity="0.6">Nanyang</text>

        <!-- === 金門 (origin, right) === -->
        <!-- Ring -->
        <circle cx="480" cy="100" r="18" fill="none" stroke="#6a3808" stroke-width="0.8" opacity="0.4"/>
        <circle cx="480" cy="100" r="12" fill="none" stroke="#b08030" stroke-width="1" opacity="0.55"/>
        <!-- Dot -->
        <circle cx="480" cy="100" r="5" fill="#b08030" stroke="#d0a840" stroke-width="1" opacity="0.95"/>
        <!-- Label -->
        <text x="480" y="78" fill="#d0a840" font-size="15" text-anchor="middle" font-family="Noto Serif TC,STSong,SimSun,serif" font-weight="bold" letter-spacing="2" opacity="0.95">金門</text>
        <text x="480" y="132" fill="#6a5030" font-size="8" text-anchor="middle" font-family="Georgia,serif" letter-spacing="1" opacity="0.6">Kinmen</text>

        <!-- Route label -->
        <text x="300" y="158" fill="#4a3018" font-size="8" text-anchor="middle" font-family="Noto Serif TC,STSong,SimSun,serif" letter-spacing="3" opacity="0.55">落　番　航　線</text>

      </svg>
    </div>
    <!-- PROVERB -->
    <div class="proverb-wrap">
      <div class="proverb-main">「六亡　三在　一回頭」</div>
      <div class="proverb-grid">
        <div class="pg-item"><div class="pg-num pg-death">六亡</div><div class="pg-label">命喪異鄉</div></div>
        <div class="pg-item"><div class="pg-num pg-stay">三在</div><div class="pg-label">落地生根</div></div>
        <div class="pg-item"><div class="pg-num pg-ret">一回頭</div><div class="pg-label">衣錦還鄉</div></div>
      </div>
    </div>

    <div class="history-text">
      <p>十九世紀中期至二十世紀初，金門地少人稠、戰亂頻仍，無數青年男丁被迫踏上黑水溝，輾轉前往廈門、廣州，再由此搭乘帆船或輪船南渡——史稱「<em>落番</em>」。</p>
      <p>他們在新加坡河畔的<em>紅燈碼頭</em>卸貨扛包，以木籤計算勞資；蹲在<em>五腳基</em>的騎樓下，以一塊豆腐、幾口湯水度日。他們寄回的「<em>僑匯</em>」，養活了金門的妻兒，也砌起了至今仍矗立的一棟棟<em>洋樓</em>。</p>
      <p>你，是金門少年<strong style="color:var(--gl)">陳阿水</strong>，即將踏上這段無法回頭的旅程。</p>
    </div>

    <div class="divider"></div>
    <button class="btn-start" onclick="Game.start()">踏上命運之路 ──</button>
  </div>
  <div class="tile-band" style="margin-top:1.5rem;"></div>
</div>

<!-- ══════════ GAME SCREEN ══════════ -->
<div id="screen-game" class="screen">
  <div class="vignette"></div>
  <div class="tile-band-sm"></div>
  <div class="game-inner">
    <div class="step-counter">◈ 步數 <span id="step-num">0</span></div>
    <div id="scene-container" class="fade-in"></div>
  </div>
</div>

<!-- ══════════ ENDING SCREEN ══════════ -->
<div id="screen-ending" class="screen">
  <div class="vignette"></div>
  <div class="tile-band-sm"></div>
  <div class="ending-inner">
    <div id="ending-container" class="fade-in"></div>
  </div>
  <div class="tile-band-sm" style="margin-top:1.5rem;"></div>
</div>

<script>
/* ════════════════════════════════════════
   AUDIO ENGINE
   （預留接口 — 替換 src 即可接入真實音效）
   Ocean:  https://example.com/ocean.mp3
   Market: https://example.com/market.mp3
   Ambient:https://example.com/ambient.mp3
════════════════════════════════════════ */
const Audio = (() => {
  /* Save the native HTMLAudio constructor before this variable shadows it */
  const _A = window.Audio;

  /* File paths (same folder as this HTML) */
  const TRACKS = {
    intro:  '遊戲主頁面開頭.mp3',
    ocean:  '海浪聲.mp3',
    market: '市場聲.mp3',
    impact: '藥水倒下.mp3'
  };

  /* Map internal audio-type strings → track key + playback config */
  const TYPE_CFG = {
    ambient: { key: 'intro',  loop: true,  vol: 0.55 },
    ocean:   { key: 'ocean',  loop: true,  vol: 0.60 },
    market:  { key: 'market', loop: true,  vol: 0.55 },
    bell:    { key: 'intro',  loop: true,  vol: 0.45 }, /* good/neutral endings */
    impact:  { key: 'impact', loop: false, vol: 0.90 }  /* 六亡 / accident */
  };

  let bg    = null;   /* current looping background element */
  let muted = false;

  const stopBg = () => {
    if (bg) { bg.pause(); bg.currentTime = 0; bg = null; }
  };

  /* Start a looping background track; skip if the same file is already running */
  const playBg = (src, vol) => {
    if (muted) return;
    if (bg && bg._src === src && !bg.paused) return; /* already playing */
    stopBg();
    bg = new _A(src);
    bg._src  = src;
    bg.loop  = true;
    bg.volume = vol;
    bg.play().catch(() => {});
  };

  /* Play a one-shot clip (stops the background first) */
  const playOnce = (src, vol) => {
    if (muted) return;
    stopBg();
    const a = new _A(src);
    a.volume = vol;
    a.play().catch(() => {});
  };

  /* ── Public API ──────────────────────────────────────────────────────── */
  return {

    /* Called on first user interaction (title screen) */
    playIntro() {
      playBg(TRACKS.intro, 0.60);
    },

    /* Called by Game engine when Audio.init() fires and on every node */
    init() {
      playBg(TRACKS.intro, 0.55);
    },

    /* Called by renderNode with node.audio type string */
    play(type) {
      if (muted) return;
      const cfg = TYPE_CFG[type] || TYPE_CFG.ambient;
      if (cfg.loop) {
        playBg(TRACKS[cfg.key], cfg.vol);
      } else {
        playOnce(TRACKS[cfg.key], cfg.vol);
      }
    },

    toggle() {
      muted = !muted;
      document.getElementById('audio-ctrl').textContent = muted ? '♪ 靜音' : '♪ 音效';
      if (muted) {
        stopBg();
      } else {
        /* Resume title track when unmuting on intro screen; game will
           override via play() as soon as the next node is rendered. */
        playBg(TRACKS.intro, 0.60);
      }
      return muted;
    },

    stop:    stopBg,
    _hasBg() { return !!bg; }
  };
})();

/* ════════════════════════════════════════
   GAME ENGINE
════════════════════════════════════════ */
const Game = (() => {
  let currentNodeId = 'start';
  let stepCount = 0;

  const screens = {
    intro: document.getElementById('screen-intro'),
    game:  document.getElementById('screen-game'),
    ending:document.getElementById('screen-ending')
  };

  const showScreen = (name) => {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const fmt = (txt) => {
    // Process inline markup
    return txt
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\[(.+?)\]/g, '<em>$1</em>');
  };

  const renderNode = (nodeId) => {
    const node = NODES[nodeId];
    if (!node) return;
    currentNodeId = nodeId;

    Audio.play(node.audio || 'ambient');

    if (node.isEnding) {
      renderEnding(node);
      return;
    }

    stepCount++;
    document.getElementById('step-num').textContent = stepCount - 1;

    const container = document.getElementById('scene-container');
    container.classList.remove('fade-in');
    void container.offsetWidth;
    container.classList.add('fade-in');

    const choicesHTML = node.choices.map(c => `
      <button class="btn-choice" onclick="Game.go('${c.next}')">
        <span class="choice-key">${esc(c.key)}</span>
        <span>
          <strong>${esc(c.label)}</strong>
          <span class="choice-sub">${esc(c.sub)}</span>
        </span>
      </button>
    `).join('');

    container.innerHTML = `
      <div class="scene-card">
        <div class="scene-inner">
          <div class="scene-tag">${esc(node.chapter)}</div>
          <div class="scene-title">${esc(node.title)}</div>
          <div class="scene-text">
            ${node.text.map(p => `<p>${fmt(esc(p))}</p>`).join('')}
          </div>
        </div>
      </div>
      ${choicesHTML}
    `;

    showScreen('game');
  };

  const hlProverb = (s, type) => {
    const colors = { death: '#c03030', stay: '#b08030', ret: '#60a858' };
    const col = colors[type] || '#b08030';
    return s.replace(/⟦([^⟧]+)⟧/g, `<strong style="font-size:1.12em;color:${col}">$1</strong>`);
  };

  const renderEnding = (node) => {
    const container = document.getElementById('ending-container');
    container.classList.remove('fade-in');
    void container.offsetWidth;
    container.classList.add('fade-in');

    container.innerHTML = `
      <div class="tile-band-sm" style="margin-bottom:1.2rem;"></div>
      <div class="ending-card ${node.endType}">
        <div class="ending-tag">【${esc(node.tag)}】</div>
        <div class="ending-title">${esc(node.title)}</div>
        <div class="ending-text">
          ${node.text.map(p => `<p>${esc(p)}</p>`).join('')}
        </div>
        <div class="ending-proverb">${hlProverb(esc(node.proverb), node.endType)}</div>
      </div>
      <div class="history-box">
        <h4>▌ 歷史脈絡</h4>
        ${esc(node.history)}
      </div>
      <div class="tile-band-sm" style="margin-bottom:.8rem;"></div>
      <button class="btn-restart" onclick="Game.restart()">← 重回金門（重新開始）</button>
    `;

    showScreen('ending');
  };

  /* ── Auto-start intro music ─────────────────────────────────────────
     Try immediately (works for local file:// and permissive browsers).
     If the browser blocks autoplay, fall back to first user interaction. */
  (function tryAutoplay() {
    const attempt = () => Audio.playIntro();
    /* Try on DOMContentLoaded (or right now if already loaded) */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', attempt, { once: true });
    } else {
      attempt();
    }
    /* Fallback: if Audio.bg is still null after load, play on first touch */
    window.addEventListener('load', function() {
      if (!Audio._hasBg()) {
        document.addEventListener('click', function _boot() {
          Audio.playIntro();
          document.removeEventListener('click', _boot);
        }, { once: true });
      }
    }, { once: true });
  })();

  return {
    start() {
      Audio.init();
      stepCount = 0;
      renderNode('start');
    },
    go(nodeId) {
      renderNode(nodeId);
    },
    restart() {
      Audio.stop();
      stepCount = 0;
      showScreen('intro');
    }
  };
})();
</script>
